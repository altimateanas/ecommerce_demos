# docker-compose.yml — CartWave Local Development Stack
# Services: PostgreSQL (Airflow metadata), PostgreSQL (app), Airflow

version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.7.3-python3.10
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__CORE__DEFAULT_TIMEZONE: 'utc'
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./dbt:/opt/airflow/dbt
  depends_on:
    postgres-airflow:
      condition: service_healthy

services:
  # -----------------------------------------------------------------
  # PostgreSQL for Airflow metadata
  # -----------------------------------------------------------------
  postgres-airflow:
    image: postgres:15-alpine
    container_name: cartwave_postgres_airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  # -----------------------------------------------------------------
  # PostgreSQL for application data (ecommerce domain tables)
  # -----------------------------------------------------------------
  postgres-app:
    image: postgres:15-alpine
    container_name: cartwave_postgres_app
    environment:
      POSTGRES_USER: cartwave_user
      POSTGRES_PASSWORD: cartwave_pass
      POSTGRES_DB: cartwave_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
      - ./setup/postgres:/docker-entrypoint-initdb.d
      - ./seeds/postgres:/seed_data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cartwave_user -d cartwave_db"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  # -----------------------------------------------------------------
  # Airflow Init (run migrations, create admin user)
  # -----------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: cartwave_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@cartwave.demo \
          --password admin
    restart: "no"

  # -----------------------------------------------------------------
  # Airflow Webserver
  # -----------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: cartwave_airflow_webserver
    command: airflow webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # -----------------------------------------------------------------
  # Airflow Scheduler
  # -----------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: cartwave_airflow_scheduler
    command: airflow scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_airflow_data:
    driver: local
  postgres_app_data:
    driver: local
